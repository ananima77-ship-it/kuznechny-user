services:
  - type: web
    name: kuznechny-user
    runtime: docker
    repo: https://github.com/ТВОЙ-ЛОГИН/kuznechny-user.git
    plan: free
    region: frankfurt
    envVars:
      - key: APP_KEY
        value: "base64:$(php artisan key:generate --show)"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: kuznechny-db
          property: connectionString
databases:
  - name: kuznechny-db
    plan: free
    region: frankfurt
